name: openli-codex-bench

services:
  postgres:
    container_name: openli-codex-bench-postgres
    image: postgres:16
    environment:
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas
      POSTGRES_DB: saas
    ports:
      - "9443:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d saas"]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Legacy embedded runners REMOVED. openli-codex-bench now consumes OpenRunner's consolidated runners
  # (host-published 9430-9433) for every runner_type — the OpenLI OpenRunner services. Same Unified
  # Runner Protocol → no adapter. Defaults below; override RUNNER_*_URL for a different OpenRunner host.

  backend:
    container_name: openli-codex-bench-backend
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://saas:saas@postgres:5432/saas
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      # All runner_types route to OpenRunner's consolidated runners (host-published 9430-9433).
      RUNNER_URL: ${RUNNER_CODEX_URL:-http://host.docker.internal:9430}
      RUNNER_CODEX_URL: ${RUNNER_CODEX_URL:-http://host.docker.internal:9430}
      RUNNER_CLAUDE_URL: ${RUNNER_CLAUDE_URL:-http://host.docker.internal:9431}
      RUNNER_OPENCODEX_URL: ${RUNNER_OPENCODEX_URL:-http://host.docker.internal:9432}
      RUNNER_MOCK_URL: ${RUNNER_MOCK_URL:-http://host.docker.internal:9433}
      # Gateway/facade mode: route runs through OpenRunner's agent-gateway (/v1/*)
      # instead of raw runner ports. raw (default) keeps current behaviour.
      RUNNER_MODE: ${RUNNER_MODE:-gateway}
      OPENRUNNER_GATEWAY_URL: ${OPENRUNNER_GATEWAY_URL:-http://host.docker.internal:9422}
      OPENRUNNER_GATEWAY_TOKEN: ${OPENRUNNER_GATEWAY_TOKEN:-}
      # Product identity for gateway-mode audit/cost attribution (R6+).
      # Tenant derives per-session from the authenticated user where available;
      # these are the fallbacks when the session/user has no tenant.
      OPENRUNNER_TENANT: ${OPENRUNNER_TENANT:-default}
      OPENRUNNER_APP: ${OPENRUNNER_APP:-openli-codex-bench}
      OPENRUNNER_USER: ${OPENRUNNER_USER:-anon}
      WORKSPACES_ROOT: /workspaces
      PORT: 8080
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach OpenRunner runners on the host (Linux parity w/ Mac)
    volumes:
      # SHARED workspace volume: mount the SAME host dir OpenRunner's runners mount
      # (openrunner/workspaces), so a session's cloned files land where the runner
      # actually reads them via the workingDirectory path. Relative paths in compose
      # resolve against this compose-file's dir, so ../openrunner/workspaces =
      # CascadeProjects/openrunner/workspaces — the exact dir the runners mount.
      # Closes the doc 25 §7 workspace-volume risk (R5 STEP 1 / AC-R5-4).
      - ${SHARED_WORKSPACES:-../openrunner/workspaces}:/workspaces
    ports:
      - "9441:8080"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health');\""]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    container_name: openli-codex-bench-frontend
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8080
      PROMPT_MANAGER_URL: http://prompt-manager:8083
      PORT: 3000
    ports:
      - "9440:3000"
    depends_on:
      - backend
      - prompt-manager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz.txt | grep -qx 'ok'"]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  prompt-manager:
    container_name: openli-codex-bench-prompt-manager
    build:
      context: ./prompt-manager
    environment:
      DATABASE_URL: postgresql+psycopg://saas:saas@postgres:5432/saas
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      GLOBAL_SKILLS_PATH: /app/skills
      PORT: 8083
    volumes:
      - ./skills:/app/skills:ro
      - ./tests:/app/tests:ro
    ports:
      - "9445:8083"
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8083/health');\""]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  evaluation:
    container_name: openli-codex-bench-evaluation
    build:
      context: ./evaluation
    environment:
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-saas-codex}
    ports:
      - "9446:8084"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8084/health');\""]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  # Legacy `memory` service REMOVED — these benches use OpenRunner's shared services only;
  # no per-bench memory store is needed. Port 9447 is intentionally left free.

  llm-gateway:
    container_name: openli-codex-bench-llm-gateway
    build:
      context: ./llm-gateway
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "9448:8086"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8086/health');\""]
      interval: 10m
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  postgres_data:
